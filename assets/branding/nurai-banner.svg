<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="NurAI banner">
  <title>NurAI — Light for the Ummah in the AI Era</title>
  <defs>
    <!-- Deep teal gradient background -->
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d48"/>
      <stop offset="50%" style="stop-color:#0D4F5C"/>
      <stop offset="100%" style="stop-color:#083340"/>
    </linearGradient>
    <!-- Gold radial glow around lantern -->
    <radialGradient id="lanternGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F5E070;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#C8A84B;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#9A7A2A;stop-opacity:0"/>
    </radialGradient>
    <!-- Soft center light halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C8A84B;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#C8A84B;stop-opacity:0"/>
    </radialGradient>
    <!-- Bismillah text glow filter -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════
       BACKGROUND
  ═══════════════════════════════════════════════════════════ -->
  <rect width="900" height="300" fill="url(#bannerBg)"/>

  <!-- Soft center glow -->
  <ellipse cx="450" cy="150" rx="380" ry="160" fill="url(#halo)"/>

  <!-- ═══════════════════════════════════════════════════════════
       DECORATIVE GEOMETRIC BORDER — top & bottom gold rules
  ═══════════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="900" height="4" fill="#C8A84B" opacity="0.6"/>
  <rect x="0" y="296" width="900" height="4" fill="#C8A84B" opacity="0.6"/>
  <rect x="0" y="6" width="900" height="1" fill="#C8A84B" opacity="0.25"/>
  <rect x="0" y="293" width="900" height="1" fill="#C8A84B" opacity="0.25"/>

  <!-- Side vertical rules -->
  <rect x="0" y="0" width="4" height="300" fill="#C8A84B" opacity="0.6"/>
  <rect x="896" y="0" width="4" height="300" fill="#C8A84B" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════════════════
       ARABESQUE CORNER ORNAMENTS
  ═══════════════════════════════════════════════════════════ -->
  <!-- Top-left corner -->
  <g transform="translate(20,20)" opacity="0.45">
    <path d="M0,0 Q20,0 20,20" fill="none" stroke="#C8A84B" stroke-width="1.2"/>
    <path d="M0,0 Q0,20 20,20" fill="none" stroke="#C8A84B" stroke-width="0.7"/>
    <circle cx="20" cy="20" r="3" fill="#C8A84B"/>
    <circle cx="0" cy="0" r="2" fill="#C8A84B"/>
  </g>
  <!-- Top-right corner -->
  <g transform="translate(880,20) scale(-1,1)" opacity="0.45">
    <path d="M0,0 Q20,0 20,20" fill="none" stroke="#C8A84B" stroke-width="1.2"/>
    <path d="M0,0 Q0,20 20,20" fill="none" stroke="#C8A84B" stroke-width="0.7"/>
    <circle cx="20" cy="20" r="3" fill="#C8A84B"/>
    <circle cx="0" cy="0" r="2" fill="#C8A84B"/>
  </g>
  <!-- Bottom-left corner -->
  <g transform="translate(20,280) scale(1,-1)" opacity="0.45">
    <path d="M0,0 Q20,0 20,20" fill="none" stroke="#C8A84B" stroke-width="1.2"/>
    <path d="M0,0 Q0,20 20,20" fill="none" stroke="#C8A84B" stroke-width="0.7"/>
    <circle cx="20" cy="20" r="3" fill="#C8A84B"/>
    <circle cx="0" cy="0" r="2" fill="#C8A84B"/>
  </g>
  <!-- Bottom-right corner -->
  <g transform="translate(880,280) scale(-1,-1)" opacity="0.45">
    <path d="M0,0 Q20,0 20,20" fill="none" stroke="#C8A84B" stroke-width="1.2"/>
    <path d="M0,0 Q0,20 20,20" fill="none" stroke="#C8A84B" stroke-width="0.7"/>
    <circle cx="20" cy="20" r="3" fill="#C8A84B"/>
    <circle cx="0" cy="0" r="2" fill="#C8A84B"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       DECORATIVE 8-POINT STARS (left and right flanks)
  ═══════════════════════════════════════════════════════════ -->
  <!-- Left star cluster -->
  <g transform="translate(105,150)" opacity="0.2">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#C8A84B" stroke-width="1" transform="rotate(0)"/>
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#C8A84B" stroke-width="1" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#C8A84B" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#C8A84B"/>
  </g>
  <!-- Right star cluster -->
  <g transform="translate(795,150)" opacity="0.2">
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#C8A84B" stroke-width="1" transform="rotate(0)"/>
    <rect x="-22" y="-22" width="44" height="44" fill="none" stroke="#C8A84B" stroke-width="1" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#C8A84B" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#C8A84B"/>
  </g>
  <!-- Smaller flanking stars -->
  <g transform="translate(55,80)" opacity="0.12">
    <rect x="-12" y="-12" width="24" height="24" fill="none" stroke="#C8A84B" stroke-width="0.8" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="2" fill="#C8A84B"/>
  </g>
  <g transform="translate(845,220)" opacity="0.12">
    <rect x="-12" y="-12" width="24" height="24" fill="none" stroke="#C8A84B" stroke-width="0.8" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="2" fill="#C8A84B"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       LANTERN ICON (centre-left of text block)
  ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(195,150)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="55" fill="url(#halo)" opacity="0.7"/>
    <!-- Decorative ring -->
    <circle cx="0" cy="0" r="52" fill="none" stroke="#C8A84B" stroke-width="0.6" opacity="0.3"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="#C8A84B" stroke-width="0.4" opacity="0.2"/>

    <!-- Hanging chain -->
    <line x1="0" y1="-55" x2="0" y2="-38" stroke="#C8A84B" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="0" cy="-55" r="3.5" fill="#C8A84B" opacity="0.7"/>

    <!-- Top cap -->
    <path d="M-11,-38 L11,-38 L14,-28 L-14,-28 Z" fill="#C8A84B"/>
    <path d="M-8,-28 L8,-28 L10,-23 L-10,-23 Z" fill="#C8A84B" opacity="0.75"/>

    <!-- Lantern body (hexagonal) -->
    <path d="M-15,-23 L15,-23 L20,0 L15,23 L-15,23 L-20,0 Z" fill="#C8A84B" opacity="0.1"/>
    <path d="M-15,-23 L15,-23 L20,0 L15,23 L-15,23 L-20,0 Z" fill="none" stroke="#C8A84B" stroke-width="2"/>

    <!-- Glass panels with glow -->
    <path d="M-12,-21 L12,-21 L16,0 L12,21 L-12,21 L-16,0 Z" fill="url(#lanternGlow2)"/>

    <!-- Horizontal band dividers -->
    <line x1="-17" y1="-8" x2="17" y2="-8" stroke="#C8A84B" stroke-width="1" opacity="0.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#C8A84B" stroke-width="1" opacity="0.5"/>
    <line x1="-17" y1="8" x2="17" y2="8" stroke="#C8A84B" stroke-width="1" opacity="0.5"/>

    <!-- Crescent moon -->
    <circle cx="-2" cy="-13" r="9" fill="#C8A84B" opacity="0.9"/>
    <circle cx="3" cy="-16" r="7" fill="#0D4F5C"/>

    <!-- Flame glow -->
    <circle cx="0" cy="3" r="6" fill="#F5E070" opacity="0.55"/>
    <circle cx="0" cy="3" r="3" fill="#F5E070" opacity="0.8"/>

    <!-- Light rays -->
    <line x1="0" y1="-5" x2="0" y2="-14" stroke="#F5E070" stroke-width="1" opacity="0.45"/>
    <line x1="7" y1="-2" x2="13" y2="-6" stroke="#F5E070" stroke-width="1" opacity="0.4"/>
    <line x1="-7" y1="-2" x2="-13" y2="-6" stroke="#F5E070" stroke-width="1" opacity="0.4"/>
    <line x1="7" y1="6" x2="13" y2="10" stroke="#F5E070" stroke-width="1" opacity="0.3"/>
    <line x1="-7" y1="6" x2="-13" y2="10" stroke="#F5E070" stroke-width="1" opacity="0.3"/>

    <!-- Bottom cap -->
    <path d="M-14,23 L14,23 L10,31 L-10,31 Z" fill="#C8A84B"/>
    <circle cx="0" cy="34" r="4" fill="#C8A84B"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       BISMILLAH in Arabic (small, above main title)
  ═══════════════════════════════════════════════════════════ -->
  <text
    x="450" y="75"
    font-family="'Amiri', 'Scheherazade New', 'Arial Unicode MS', serif"
    font-size="18"
    fill="#C8A84B"
    text-anchor="middle"
    opacity="0.7"
    direction="rtl"
    filter="url(#textGlow)">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</text>

  <!-- Divider line beneath Bismillah -->
  <line x1="310" y1="84" x2="590" y2="84" stroke="#C8A84B" stroke-width="0.6" opacity="0.35"/>
  <!-- Small diamond centres -->
  <polygon points="450,81 453,84 450,87 447,84" fill="#C8A84B" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════════════════
       MAIN WORDMARK: NurAI
  ═══════════════════════════════════════════════════════════ -->
  <text
    x="450" y="168"
    font-family="'Cinzel', 'Cormorant Garamond', 'Palatino Linotype', 'Georgia', serif"
    font-size="72"
    font-weight="700"
    fill="#F8F4E8"
    text-anchor="middle"
    letter-spacing="8">NurAI</text>

  <!-- Gold accent under the 'u' — dot/mark evoking diacritics -->
  <text
    x="450" y="158"
    font-family="'Amiri', 'Scheherazade New', serif"
    font-size="14"
    fill="#C8A84B"
    text-anchor="middle"
    opacity="0.6">نُور</text>

  <!-- ═══════════════════════════════════════════════════════════
       TAGLINE
  ═══════════════════════════════════════════════════════════ -->
  <!-- Decorative rule above tagline -->
  <line x1="280" y1="184" x2="620" y2="184" stroke="#C8A84B" stroke-width="0.7" opacity="0.4"/>

  <text
    x="450" y="210"
    font-family="'Lato', 'Gill Sans', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="15"
    fill="#C8A84B"
    text-anchor="middle"
    letter-spacing="3.5">LIGHT FOR THE UMMAH IN THE AI ERA</text>

  <!-- ═══════════════════════════════════════════════════════════
       SUBTITLE / MISSION LINE
  ═══════════════════════════════════════════════════════════ -->
  <text
    x="450" y="240"
    font-family="'Lato', 'Helvetica Neue', 'Arial', sans-serif"
    font-size="12"
    fill="#F8F4E8"
    text-anchor="middle"
    opacity="0.6"
    letter-spacing="1">Grounded in Qur'an &amp; Sunnah · Inspired by Risale-i Nur · Powered by AI</text>

  <!-- ═══════════════════════════════════════════════════════════
       BOTTOM DECORATIVE ROW OF SMALL STARS
  ═══════════════════════════════════════════════════════════ -->
  <g transform="translate(450,265)" opacity="0.35">
    <!-- 5 small 4-point stars spaced evenly -->
    <g transform="translate(-80,0)">
      <polygon points="0,-5 1.5,-1.5 5,0 1.5,1.5 0,5 -1.5,1.5 -5,0 -1.5,-1.5" fill="#C8A84B"/>
    </g>
    <g transform="translate(-40,0)">
      <polygon points="0,-4 1.2,-1.2 4,0 1.2,1.2 0,4 -1.2,1.2 -4,0 -1.2,-1.2" fill="#C8A84B"/>
    </g>
    <g transform="translate(0,0)">
      <polygon points="0,-5 1.5,-1.5 5,0 1.5,1.5 0,5 -1.5,1.5 -5,0 -1.5,-1.5" fill="#C8A84B"/>
    </g>
    <g transform="translate(40,0)">
      <polygon points="0,-4 1.2,-1.2 4,0 1.2,1.2 0,4 -1.2,1.2 -4,0 -1.2,-1.2" fill="#C8A84B"/>
    </g>
    <g transform="translate(80,0)">
      <polygon points="0,-5 1.5,-1.5 5,0 1.5,1.5 0,5 -1.5,1.5 -5,0 -1.5,-1.5" fill="#C8A84B"/>
    </g>
  </g>
</svg>
